"Jia Jia Tangbao":{url:"https://untourfoodtours.com/shanghai-restaurants/jia-jia-tangbao/",excerpt:"At 127 Huanghe Road, there's a queue that starts before the doors open. Jia Jia Tangbao serves what many consider Shanghai's definitive soup dumpling — delicate skins, scalding broth, and fillings that range from classic pork to salted duck egg yolk. The kitchen is visible through glass, the menu is four items, and the experience is transcendent. Eat them the moment they hit the table."},
"Old Jesse":{url:"https://untourfoodtours.com/shanghai-restaurants/old-jesse/",excerpt:"Lao Ji Shi — Old Jesse — is Shanghainese home cooking elevated to legend. Chef has been doing this for decades on Tianping Road. The codfish head is famous: pre-order it or weep. The red-braised pork shank falls apart at a glance. Soy-braised greens, drunken chicken, lion's head meatballs — everything tastes like someone's grandmother made it, and that grandmother was extraordinary."},
"Canton Table":{url:"https://untourfoodtours.com/shanghai-restaurants/canton-table/",excerpt:"On the third floor of Three on the Bund, Canton Table marries Hong Kong dim sum tradition with Shanghai riverside theater. The har gow are translucent. The char siu is lacquered. The tea sommelier will change how you think about Pu-erh. Views of the Pudong skyline through floor-to-ceiling glass make this a lunch that lingers — both in memory and on the palate."},
"Tai\'An Table":{url:"https://untourfoodtours.com/shanghai-restaurants/taian-table/",excerpt:"Three Michelin stars. Chef Stefan Stiller's tasting menu is the Shanghai splurge — and worth every yuan. Hidden in a nondescript lane house, the dining room seats barely twenty. Each course is a meditation: locally sourced, globally inspired, technically perfect. The surprise menu format means you surrender control, and that's the point. Book weeks ahead."},
"Wei Xiang Zhai":{url:"https://untourfoodtours.com/shanghai-restaurants/wei-xiang-zhai/",excerpt:"At 14 Yandang Road, a sesame-peanut noodle shop has been doing one thing brilliantly for years. The cold noodles arrive slicked in a paste of toasted sesame and ground peanut, with a hit of vinegar and chili. The texture is slippery, the flavor is nutty-spicy-tangy, and the price is almost insulting. Wei Xiang Zhai proves that simplicity, done perfectly, is genius."},
"Ben Zhen":{url:"https://untourfoodtours.com/shanghai-restaurants/ben-zhen/",excerpt:"Sichuan food in Shanghai reaches its peak at Ben Zhen. The peppercorn fish swims in a bath of chili oil and Sichuan peppercorns that numb your lips and light up your brain. The craft beer selection is excellent — you'll need it. The space is modern, the crowd is young, and the spice levels are not for the faint of heart. Order the cold chicken in chili sauce to start."},

function RequestsTab({requests,setRequests,isOwner}){const[form,setForm]=useState({venue:"",date:"",time:"",guests:"",notes:""});const[submitted,setSubmitted]=useState(false);
const submit=()=>{if(!form.venue||!form.guests)return;setRequests(p=>[...p,{...form,id:Date.now(),status:"pending",ownerNotes:""}]);setForm({venue:"",date:"",time:"",guests:"",notes:""});setSubmitted(true);setTimeout(()=>setSubmitted(false),3000);};
const iS={width:"100%",padding:"9px 12px",background:T.bgS,border:"1px solid "+T.bd,borderRadius:8,color:T.fg,fontSize:12,fontFamily:"'Plus Jakarta Sans',sans-serif",outline:"none"};
return<div style={{padding:"16px 14px",maxWidth:700,margin:"0 auto"}}><h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:22,color:T.fg,textAlign:"center",marginBottom:4}}>{isOwner?"Booking Requests":"Request a Booking"}</h2><p style={{fontSize:12,color:T.mt,textAlign:"center",marginBottom:16}}>{isOwner?"Manage restaurant & tour bookings":"Ask your host to book a restaurant or CB walk for you"}</p>
{!isOwner&&<div style={{background:T.wh,borderRadius:12,padding:16,border:"1px solid "+T.bd,marginBottom:16}}>{submitted?<div style={{textAlign:"center",padding:20}}><div style={{fontSize:28,marginBottom:8}}>✅</div><div style={{fontSize:14,color:T.olive}}>Request sent!</div></div>:<><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}><div><label style={{fontSize:10,color:T.mt}}>Restaurant / Tour / Experience *</label><input value={form.venue} onChange={e=>setForm({...form,venue:e.target.value})} placeholder="e.g. Çiya Sofrası dinner" style={iS}/></div><div><label style={{fontSize:10,color:T.mt}}>Guests *</label><input value={form.guests} onChange={e=>setForm({...form,guests:e.target.value})} placeholder="4 adults" style={iS}/></div></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}><div><label style={{fontSize:10,color:T.mt}}>Date</label><input value={form.date} onChange={e=>setForm({...form,date:e.target.value})} placeholder="Tuesday, June 10" style={iS}/></div><div><label style={{fontSize:10,color:T.mt}}>Time</label><input value={form.time} onChange={e=>setForm({...form,time:e.target.value})} placeholder="7:30 PM" style={iS}/></div></div><button onClick={submit} style={{width:"100%",padding:"10px",background:form.venue&&form.guests?T.terra:T.bgS,color:form.venue&&form.guests?"#fff":T.mt,border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:form.venue&&form.guests?"pointer":"default"}}>Submit Request</button></>}</div>}
{requests.length===0&&<div style={{textAlign:"center",padding:40,color:T.mt,fontSize:12}}>{isOwner?"No requests yet.":"Your requests will appear here."}</div>}
{requests.map(r=><div key={r.id} style={{background:T.wh,borderRadius:10,padding:14,marginBottom:8,border:"1px solid "+(r.status==="confirmed"?T.olive+"44":r.status==="declined"?T.red+"44":T.bd)}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><div style={{fontFamily:"'DM Serif Display',serif",fontSize:15,fontWeight:600}}>{r.venue}</div><span style={{fontSize:10,padding:"2px 8px",borderRadius:10,fontWeight:600,background:r.status==="confirmed"?T.oliveS:r.status==="declined"?T.red+"10":T.goldS,color:r.status==="confirmed"?T.olive:r.status==="declined"?T.red:T.gold}}>{r.status==="confirmed"?"✓ Confirmed":r.status==="declined"?"✗ Unavailable":"⏳ Pending"}</span></div><div style={{display:"flex",gap:16,fontSize:11,color:T.mt}}>{r.date&&<span>{r.date}</span>}{r.time&&<span>{r.time}</span>}{r.guests&&<span>{r.guests}</span>}</div>{isOwner&&r.status==="pending"&&<div style={{display:"flex",gap:6,marginTop:8}}><button onClick={()=>setRequests(p=>p.map(x=>x.id===r.id?{...x,status:"confirmed"}:x))} style={{flex:1,padding:"7px",background:T.oliveS,color:T.olive,border:"1px solid "+T.olive+"33",borderRadius:7,fontSize:11,fontWeight:600,cursor:"pointer"}}>✓ Confirm</button><button onClick={()=>setRequests(p=>p.map(x=>x.id===r.id?{...x,status:"declined"}:x))} style={{flex:1,padding:"7px",background:T.red+"10",color:T.red,border:"1px solid "+T.red+"25",borderRadius:7,fontSize:11,fontWeight:600,cursor:"pointer"}}>✗ Decline</button></div>}</div>)}
</div>;}

/* ═══ CHAT TAB ═══ */
function ChatTab({guestInfo}){const[msgs,setMsgs]=useState([{role:"assistant",content:"Ni hao! I'm your UnTour Food Tours Shanghai concierge."+(guestInfo?" Welcome, "+guestInfo.name.split(" ")[0]+"!":"")+"\n\nI know every backstreet, every usta, every lokanta. Ask me anything — where to eat tonight, how to avoid tourist traps, which ferry to take, or what to order when you can't read the menu."}]);const[input,setInput]=useState("");const[loading,setLoading]=useState(false);const endRef=useRef(null);
useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs,loading]);
const chips=["Best dinner tonight?","Where to eat near the Bund?","Best dumplings in Shanghai?","Spicy food recommendations?","Cheap & amazing lunch?","What apps do I need?"];
const send=async t=>{if(!t.trim()||loading)return;const um={role:"user",content:t.trim()};setMsgs(p=>[...p,um]);setInput("");setLoading(true);try{const h=[...msgs.filter(m=>m.role!=="system"),um].map(m=>({role:m.role,content:m.content}));const res=await fetch(API_PROXY_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,system:GUIDE,messages:h})});const data=await res.json();const reply=data.content?.map(b=>b.text||"").join("\n")||"Sorry, try again!";setMsgs(p=>[...p,{role:"assistant",content:reply}]);}catch{setMsgs(p=>[...p,{role:"assistant",content:"Connection issue — try again!"}]);}setLoading(false);};
const renderMsg=text=>{const parts=linkP(text);if(typeof parts==="string")return parts;return parts.map((p,i)=>typeof p==="string"?<span key={i}>{p}</span>:<a key={i} href={MB+p.query} target="_blank" rel="noopener" style={{color:T.sky,textDecoration:"underline",textDecorationColor:T.sky+"55",textUnderlineOffset:2}}>{p.place}</a>);};
return<div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 100px)",maxWidth:700,margin:"0 auto"}}><div style={{flex:1,overflowY:"auto",padding:"14px 14px 8px"}}>{msgs.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:10}}>{m.role==="assistant"&&<div style={{width:28,height:28,borderRadius:8,background:T.terra,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#fff",marginRight:6,flexShrink:0,marginTop:2,fontFamily:"'DM Serif Display',serif",letterSpacing:1}}>UT</div>}<div style={{maxWidth:"80%",padding:"10px 14px",borderRadius:m.role==="user"?"14px 14px 4px 14px":"14px 14px 14px 4px",background:m.role==="user"?T.fg:T.wh,color:m.role==="user"?"#fff":T.fg,fontSize:13,lineHeight:1.6,whiteSpace:"pre-wrap",border:m.role==="user"?"none":"1px solid "+T.bd}}>{m.role==="assistant"?renderMsg(m.content):m.content}</div></div>)}{loading&&<div style={{display:"flex",gap:6,marginBottom:10}}><div style={{width:28,height:28,borderRadius:8,background:T.terra,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#fff",fontFamily:"'DM Serif Display',serif",letterSpacing:1}}>UT</div><div style={{padding:"10px 14px",background:T.wh,borderRadius:"14px 14px 14px 4px",border:"1px solid "+T.bd,color:T.mt,fontSize:13}}><span style={{animation:"pulse 1s ease infinite"}}>●</span><span style={{animation:"pulse 1s ease infinite .2s"}}> ●</span><span style={{animation:"pulse 1s ease infinite .4s"}}> ●</span></div></div>}{msgs.length<=1&&!loading&&<div style={{marginTop:4}}><p style={{fontSize:11,color:T.mt,marginBottom:6}}>Quick questions:</p><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{chips.map((c,i)=><button key={i} onClick={()=>send(c)} style={{background:T.wh,border:"1px solid "+T.terra+"20",color:T.terra,fontSize:11,padding:"6px 10px",borderRadius:16,cursor:"pointer"}}>{c}</button>)}</div></div>}<div ref={endRef}/></div>
<div style={{padding:"8px 14px 14px",borderTop:"1px solid "+T.bd,background:T.bg,display:"flex",gap:6}}><input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send(input)} placeholder="Ask about restaurants, neighborhoods, street food..." style={{flex:1,padding:"10px 14px",background:T.wh,border:"1px solid "+T.bd,borderRadius:20,color:T.fg,fontSize:13,fontFamily:"'Plus Jakarta Sans',sans-serif",outline:"none"}}/><button onClick={()=>send(input)} disabled={loading||!input.trim()} style={{padding:"10px 18px",background:input.trim()?T.terra:T.bgS,border:"none",borderRadius:20,color:input.trim()?"#fff":T.mt,fontWeight:600,fontSize:13,cursor:input.trim()?"pointer":"default"}}>Send</button></div>
</div>;}

/* ═══ OWNER TAB ═══ */
function OwnerTab({week,guests,setGuests,alts,setAlts}){
const[newG,setNewG]=useState({name:"",checkin:"",checkout:"",notes:""});
const[copied,setCopied]=useState(null);
const[altFilter,setAltFilter]=useState("all");
const[editAlt,setEditAlt]=useState(null);const[altForm,setAltForm]=useState({});
const[newAlt,setNewAlt]=useState(false);
const allCats=[...new Set(alts.map(a=>a.cat))].sort();
const filtAlts=altFilter==="all"?alts:alts.filter(a=>a.cat===altFilter);
const iS={width:"100%",padding:"8px 10px",background:T.bgS,border:"1px solid "+T.bd,borderRadius:7,color:T.fg,fontSize:12,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"};

const addGuest=()=>{if(!newG.name||!newG.checkin)return;const id=Date.now().toString(36)+Math.random().toString(36).slice(2,6);const numDays=newG.checkout?Math.ceil((new Date(newG.checkout)-new Date(newG.checkin))/(86400000))+1:5;const baseWeek=JSON.parse(JSON.stringify(week)).slice(0,Math.min(numDays,week.length));const guest={id,name:newG.name,checkin:newG.checkin,checkout:newG.checkout||addDays(newG.checkin,4),notes:newG.notes,week:baseWeek,created:Date.now()};setGuests(p=>[...p,guest]);saveGD(id,guest);setNewG({name:"",checkin:"",checkout:"",notes:""});};

const genLink=g=>{const payload={id:g.id,name:g.name,checkin:g.checkin,checkout:g.checkout,week:g.week};const encoded=btoa(encodeURIComponent(JSON.stringify(payload)));const base=window.location.origin+window.location.pathname;const link=base+"?g="+g.id+"&d="+encoded;navigator.clipboard?.writeText(link);setCopied(g.id);setTimeout(()=>setCopied(null),2500);};
const delGuest=id=>{setGuests(p=>p.filter(g=>g.id!==id));try{localStorage.removeItem(SP+id);}catch{}};

return<div style={{padding:"16px 14px",maxWidth:700,margin:"0 auto"}}>
<h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:22,color:T.fg,textAlign:"center",marginBottom:16}}>Owner Dashboard</h2>

{/* GUEST MANAGER */}
<div style={{background:T.wh,borderRadius:12,padding:16,border:"1px solid "+T.terra+"28",marginBottom:16}}>
<h3 style={{fontFamily:"'DM Serif Display',serif",fontSize:16,color:T.terra,marginBottom:12}}>Guest Manager</h3>
<div style={{background:T.bgS,borderRadius:10,padding:14,border:"1px solid "+T.bd,marginBottom:12}}>
<div style={{fontSize:12,fontWeight:600,marginBottom:8}}>+ New Guest</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
<div><label style={{fontSize:10,color:T.mt}}>Guest Name *</label><input value={newG.name} onChange={e=>setNewG({...newG,name:e.target.value})} placeholder="Sarah & Mike Johnson" style={iS}/></div>
<div><label style={{fontSize:10,color:T.mt}}>Notes</label><input value={newG.notes} onChange={e=>setNewG({...newG,notes:e.target.value})} placeholder="Love spicy food, vegetarian" style={iS}/></div>
</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
<div><label style={{fontSize:10,color:T.mt}}>Check-in *</label><input type="date" value={newG.checkin} onChange={e=>setNewG({...newG,checkin:e.target.value})} style={iS}/></div>
<div><label style={{fontSize:10,color:T.mt}}>Check-out</label><input type="date" value={newG.checkout} onChange={e=>setNewG({...newG,checkout:e.target.value})} style={iS}/></div>
<div style={{display:"flex",alignItems:"flex-end"}}><button onClick={addGuest} style={{width:"100%",padding:"8px",background:newG.name&&newG.checkin?T.terra:T.bgS,color:newG.name&&newG.checkin?"#fff":T.mt,border:"none",borderRadius:7,fontSize:12,fontWeight:600,cursor:newG.name&&newG.checkin?"pointer":"default"}}>Create Guide</button></div>
</div></div>
{guests.length===0?<div style={{textAlign:"center",padding:20,color:T.mt,fontSize:12}}>No guests yet.</div>:
guests.map(g=><div key={g.id} style={{background:T.bgS,borderRadius:10,padding:14,marginBottom:8,border:"1px solid "+T.bd}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
<div><div style={{fontSize:14,fontWeight:600}}>{g.name}</div><div style={{fontSize:10,color:T.mt}}>{fmtDate(g.checkin)} → {fmtDate(g.checkout)} · {g.week.length} days</div></div>
<div style={{display:"flex",gap:5}}>
<button onClick={()=>genLink(g)} style={{fontSize:11,color:copied===g.id?T.olive:T.terra,background:copied===g.id?T.oliveS:T.terraS,border:"1px solid "+(copied===g.id?T.olive:T.terra)+"33",borderRadius:7,padding:"5px 12px",cursor:"pointer",fontWeight:600}}>{copied===g.id?"✓ Copied!":"Copy Link"}</button>
<button onClick={()=>delGuest(g.id)} style={{fontSize:11,color:T.red,background:T.red+"10",border:"1px solid "+T.red+"25",borderRadius:7,padding:"5px 8px",cursor:"pointer"}}>✕</button>
</div></div>
{g.notes&&<p style={{fontSize:11,color:T.terra}}>{g.notes}</p>}
</div>)}
</div>

{/* RECOMMENDATIONS BANK */}
<div style={{background:T.wh,borderRadius:12,padding:16,border:"1px solid "+T.terra+"28"}}>
<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
<h3 style={{fontFamily:"'DM Serif Display',serif",fontSize:16,color:T.terra}}>Recommendations Bank ({alts.length})</h3>
<button onClick={()=>{setNewAlt(true);setAltForm({l:"",d:"",tag:"dinner",cat:"dinner",map:""});}} style={{fontSize:11,color:T.terra,background:T.terraS,border:"1px solid "+T.terra+"33",borderRadius:7,padding:"5px 12px",cursor:"pointer",fontWeight:600}}>+ Add</button>
</div>
<div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:12}}>
<button onClick={()=>setAltFilter("all")} style={{fontSize:10,padding:"4px 10px",borderRadius:16,border:"1px solid "+(altFilter==="all"?T.terra:T.bd),background:altFilter==="all"?T.terraS:T.bgS,color:altFilter==="all"?T.terra:T.mt,cursor:"pointer",fontWeight:600}}>All ({alts.length})</button>
{allCats.map(c=>{const cnt=alts.filter(a=>a.cat===c).length;return<button key={c} onClick={()=>setAltFilter(altFilter===c?"all":c)} style={{fontSize:10,padding:"4px 10px",borderRadius:16,border:"1px solid "+(altFilter===c?T.terra:T.bd),background:altFilter===c?T.terraS:T.bgS,color:altFilter===c?T.terra:T.mt,cursor:"pointer",fontWeight:500}}>{c} ({cnt})</button>;})}
</div>
{newAlt&&<div style={{background:T.bgS,borderRadius:10,padding:12,border:"2px solid "+T.terra,marginBottom:10}}>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}}>
<div><label style={{fontSize:9,color:T.mt}}>Name *</label><input value={altForm.l||""} onChange={e=>setAltForm({...altForm,l:e.target.value})} style={iS}/></div>
<div><label style={{fontSize:9,color:T.mt}}>Category</label><select value={altForm.cat||"dinner"} onChange={e=>setAltForm({...altForm,cat:e.target.value})} style={{...iS,cursor:"pointer"}}>{["dinner","lunch","breakfast","street","noodles","drinks","sichuan","brunch","coffee","walk","sight","tour"].map(c=><option key={c} value={c}>{c}</option>)}</select></div>
</div>
<div style={{marginBottom:6}}><label style={{fontSize:9,color:T.mt}}>Description</label><input value={altForm.d||""} onChange={e=>setAltForm({...altForm,d:e.target.value})} style={iS}/></div>
<div style={{display:"flex",gap:4}}>
<button onClick={()=>{if(altForm.l){setAlts(p=>[...p,{...altForm,tag:altForm.cat}]);setNewAlt(false);setAltForm({});}}} style={{padding:"7px 14px",background:altForm.l?T.terra:T.bgS,color:altForm.l?"#fff":T.mt,border:"none",borderRadius:7,fontSize:11,fontWeight:600,cursor:"pointer"}}>Save</button>
<button onClick={()=>setNewAlt(false)} style={{padding:"7px 10px",background:T.wh,color:T.mt,border:"1px solid "+T.bd,borderRadius:7,fontSize:11,cursor:"pointer"}}>✕</button>
</div></div>}
<div style={{maxHeight:400,overflowY:"auto"}}>
{filtAlts.map((a,fi)=>{const ri=alts.indexOf(a);const s=TS[a.tag]||TS.lunch;
return<div key={ri} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:T.bgS,borderRadius:8,marginBottom:3,border:"1px solid "+T.bd}}>
<span style={{fontSize:12,width:20,textAlign:"center"}}>{s.i}</span>
<div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.l}</div><div style={{fontSize:10,color:T.mt,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.d}</div></div>
<span style={{fontSize:9,color:s.a,background:s.bg,padding:"2px 6px",borderRadius:8,flexShrink:0}}>{a.cat}</span>
</div>;})}
</div></div>
</div>;}

/* ═══ APP ═══ */
function App(){
const[tab,setTab]=useState("week");
const[isOwner,setIsOwner]=useState(false);
const[week,setWeek]=useState(initWeek);
const[requests,setRequests]=useState([]);
const[guests,setGuests]=useState([]);
const[guestMode,setGuestMode]=useState(false);
const[guestInfo,setGuestInfo]=useState(null);
const[alts,setAlts]=useState([...ALTS]);

useEffect(()=>{const gId=getURLGuest();if(!gId)return;const saved=loadGD(gId);if(saved){setGuestInfo({name:saved.name,checkin:saved.checkin,checkout:saved.checkout});setWeek(saved.week);setGuestMode(true);return;}const decoded=decodeGuestURL();if(decoded){setGuestInfo({name:decoded.name,checkin:decoded.checkin,checkout:decoded.checkout});setWeek(decoded.week);saveGD(gId,decoded);setGuestMode(true);};},[]);

useEffect(()=>{if(!guestMode)return;const gId=getURLGuest();if(!gId)return;saveGD(gId,{...guestInfo,id:gId,week});},[week,guestMode,guestInfo]);

return<div style={{minHeight:"100vh",background:T.bg}}>
<Header tab={tab} setTab={setTab} isOwner={isOwner} setIsOwner={setIsOwner} guestMode={guestMode} guestInfo={guestInfo}/>
{tab==="week"&&<WeekTab week={week} setWeek={setWeek} guestInfo={guestInfo} isOwner={isOwner}/>}
{tab==="trips"&&<TripsTab setWeek={setWeek} setTab={setTab}/>}
{tab==="info"&&<InfoTab/>}
{tab==="requests"&&<RequestsTab requests={requests} setRequests={setRequests} isOwner={isOwner}/>}
{tab==="chat"&&<ChatTab guestInfo={guestInfo}/>}
{tab==="owner"&&isOwner&&<OwnerTab week={week} guests={guests} setGuests={setGuests} alts={alts} setAlts={setAlts}/>}
<div style={{textAlign:"center",padding:"28px 20px 20px"}}>
<div style={{fontSize:11,color:T.mtL,lineHeight:1.8}}>
<span style={{color:T.terra,fontWeight:700}}>DEMO</span> · Built for UnTour Food Tours by <span style={{fontWeight:600,color:T.mt}}>Arrivo</span>
</div></div>
</div>;}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
