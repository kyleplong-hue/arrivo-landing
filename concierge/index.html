// Haversine distance in km
function hav(a,b){
const R=6371,toR=Math.PI/180;
const dLat=(b[0]-a[0])*toR,dLon=(b[1]-a[1])*toR;
const x=Math.sin(dLat/2)**2+Math.cos(a[0]*toR)*Math.cos(b[0]*toR)*Math.sin(dLon/2)**2;
return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function travelTime(origin,mapQ){
if(!mapQ)return null;
const dest=COORDS[mapQ];if(!dest)return null;
const km=hav(origin,dest);if(km<0.15)return null;
const walkMin=Math.round(km/5*60/5)*5;
const driveMin=Math.max(5,Math.round(km/DRIVE_SPD*60/5)*5);
return{km,walkMin,driveMin};
}

function fD(s){if(!s)return"";return new Date(s+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});}
function aD(s,n){const d=new Date(s+"T12:00:00");d.setDate(d.getDate()+n);return d;}

// UTF-8 safe base64 using TextEncoder
function toB64(s){
const bytes=new TextEncoder().encode(s);
let bin="";for(let i=0;i<bytes.length;i++)bin+=String.fromCharCode(bytes[i]);
return btoa(bin);
}
function fromB64(s){
const bin=atob(s);
const bytes=new Uint8Array(bin.length);
for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
return new TextDecoder().decode(bytes);
}

// Clipboard with fallback + prompt as last resort
function copyText(text){
try{
const ta=document.createElement("textarea");ta.value=text;ta.style.cssText="position:fixed;top:0;left:0;opacity:0";
document.body.appendChild(ta);ta.focus();ta.select();
const ok=document.execCommand("copy");
document.body.removeChild(ta);
if(!ok)throw new Error("execCommand failed");
}catch(e){
try{navigator.clipboard.writeText(text)}catch(e2){
window.prompt("Copy this link:",text);
}
}
}

function parseICal(text){
const evts=[];const blocks=text.split("BEGIN:VEVENT");
for(let i=1;i<blocks.length;i++){
const b=blocks[i].split("END:VEVENT")[0].replace(/\r\n /g,"");
const get=(k)=>{const m=b.match(new RegExp(k+"[^:]*:(.+)"));return m?m[1].trim():null;};
const sum=get("SUMMARY")||"";
if(/not available|blocked|closed/i.test(sum))continue;
const ds=get("DTSTART");const de=get("DTEND");
if(!ds||!de)continue;
const ci=ds.replace(/(\d{4})(\d{2})(\d{2}).*/,"$1-$2-$3");
const co=de.replace(/(\d{4})(\d{2})(\d{2}).*/,"$1-$2-$3");
if(new Date(co)<new Date())continue;
const desc=(get("DESCRIPTION")||"").replace(/\\n/g,"\n");
const phone=(desc.match(/(\d{4})\s*$/m)||[])[1]||"";
const airbnbRes=(desc.match(/reservations\/details\/(\w+)/)||[])[1]||"";
const email=(desc.match(/[\w.-]+@[\w.-]+\.\w{2,}/)||[])[0]||(b.match(/ATTENDEE.*mailto:([\w.-]+@[\w.-]+\.\w{2,})/)||[])[1]||"";
const isGeneric=/^(reserved|booking|reservation|blocked|busy)$/i.test(sum.trim());
const name=isGeneric?"":sum.replace(/\s*-\s*\d+\s*guest.*$/i,"").replace(/\s*\(.*\)$/,"").trim();
const guestCount=(sum.match(/(\d+)\s*guest/i)||desc.match(/(\d+)\s*guest/i)||desc.match(/party.*?(\d+)/i)||[])[1]||"";
evts.push({ci,co,phone,resCode:airbnbRes,name,email,guests:guestCount,summary:sum,desc});
}
evts.sort((a,b)=>a.ci.localeCompare(b.ci));
return evts;
}

return(<div key={g.id} style={{background:C.wh,borderRadius:14,border:isEd?"2px solid "+C.cr:"1px solid "+C.bd,padding:"14px 16px",marginBottom:8}}>
{isEd?<div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
<div><label style={{fontSize:11,color:C.mt,display:"block",marginBottom:3}}>Name</label><input value={editData.name||""} onChange={e=>setEditData({...editData,name:e.target.value})} style={iS}/></div>
<div><label style={{fontSize:11,color:C.mt,display:"block",marginBottom:3}}>Email</label><input value={editData.email||""} onChange={e=>setEditData({...editData,email:e.target.value})} placeholder="guest@email.com" style={iS}/></div>
</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
<div><label style={{fontSize:11,color:C.mt,display:"block",marginBottom:3}}>Start</label><input type="date" value={editData.ci||""} onChange={e=>setEditData({...editData,ci:e.target.value})} style={iS}/></div>
<div><label style={{fontSize:11,color:C.mt,display:"block",marginBottom:3}}>End</label><input type="date" value={editData.co||""} onChange={e=>setEditData({...editData,co:e.target.value})} style={iS}/></div>
</div>
<div style={{marginBottom:8}}><label style={{fontSize:11,color:C.mt,display:"block",marginBottom:3}}>Notes</label><input value={editData.n||""} onChange={e=>setEditData({...editData,n:e.target.value})} placeholder="Dietary needs, preferences..." style={iS}/></div>
<div style={{marginBottom:10}}><label style={{fontSize:11,color:C.mt,display:"block",marginBottom:3}}>Template</label>
<select value={editData.tplId||""} onChange={e=>{const t=tpls.find(x=>x.id===e.target.value);if(t)setEditData({...editData,tplId:t.id,tplName:t.name,wk:JSON.parse(JSON.stringify(t.wk))});}} style={{...iS,cursor:"pointer"}}>
{tpls.map(t=><option key={t.id} value={t.id}>{t.name}{t.isDefault?" (default)":""}</option>)}
</select></div>
<div style={{display:"flex",gap:6}}>
<button onClick={()=>{setGs(gs.map(x=>x.id===g.id?{...x,name:editData.name,ci:editData.ci,co:editData.co,n:editData.n,email:editData.email,tplName:editData.tplName,wk:editData.wk||x.wk}:x));setEditId(null);}} style={{flex:1,fontSize:13,color:"#fff",background:C.sg,border:"none",borderRadius:20,padding:"10px",cursor:"pointer",fontWeight:600}}>Save</button>
<button onClick={()=>setEditId(null)} style={{fontSize:13,color:C.mt,background:C.bgS,border:"1px solid "+C.bd,borderRadius:20,padding:"10px 16px",cursor:"pointer"}}>Cancel</button>
</div>
</div>:<>
<div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8,cursor:"pointer"}} onClick={()=>{setEditId(g.id);setEditData({name:g.name,ci:g.ci,co:g.co,n:g.n||"",email:g.email||"",tplId:(tpls.find(t=>t.name===g.tplName)||tpls[0]).id,tplName:g.tplName,wk:g.wk});}}>
<div style={{width:36,height:36,borderRadius:10,background:C.wmS,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:C.wm}}>{g.name.charAt(0)}</div>
<div style={{flex:1}}>
<div style={{fontSize:14,fontWeight:600}}>{g.name} <span style={{fontSize:10,color:C.mtL}}></span></div>
<div style={{fontSize:12,color:C.mt}}>{fD(g.ci)} {"\u2192"} {fD(g.co)}{g.tplName?" \u00B7 "+g.tplName:""}</div>
{g.n&&<div style={{fontSize:11,color:C.mt}}>{g.n}</div>}
</div>
<button onClick={e=>{e.stopPropagation();setGs(gs.filter(x=>x.id!==g.id));}} style={{width:28,height:28,borderRadius:8,background:C.bgS,border:"1px solid "+C.bd,color:"#D4766A",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{"\u2715"}</button>
</div>
<div style={{display:"flex",gap:6}}>
<button onClick={()=>cpy(g)} style={{flex:1,fontSize:13,color:cp===g.id?C.sg:C.cr,background:cp===g.id?C.sgS:C.crS,border:"none",borderRadius:20,padding:"10px 14px",cursor:"pointer",fontWeight:600}}>{cp===g.id?"\u2713 Link Copied!":"\uD83D\uDD17 Copy Link"}</button>
{g.email&&<a href={mailto} style={{flex:1,fontSize:13,color:"#fff",background:C.sg,border:"none",borderRadius:20,padding:"10px 14px",cursor:"pointer",fontWeight:600,textDecoration:"none",textAlign:"center",display:"block"}}>{"\u2709\uFE0F"} Email Guide</a>}
</div>
</>}
</div>)})}

{/* Recommendations Bank */}
<RecsBank alts={alts} setAlts={setAlts}/>
</div>);}

const TPL_KEY="ut_templates";const GS_KEY="ut_guests";const INF_KEY="ut_essentials";const RQ_KEY="ut_bookings";
function loadTpls(){try{const s=localStorage.getItem(TPL_KEY);if(s){const t=JSON.parse(s);if(t.length)return t;}}catch(e){}return[{id:"default",name:"Default",wk:JSON.parse(JSON.stringify(IW)),isDefault:true}];}
function loadGs(){try{const s=localStorage.getItem(GS_KEY);if(s)return JSON.parse(s);}catch(e){}return[];}
function loadInf(){try{const s=localStorage.getItem(INF_KEY);if(s)return JSON.parse(s);}catch(e){}return JSON.parse(JSON.stringify(INF));}
function loadRq(){try{const s=localStorage.getItem(RQ_KEY);if(s)return JSON.parse(s);}catch(e){}return[];}

function App(){
const[tab,setTab]=useState("week");const[isO,setIsO]=useState(false);
const[wk,setWk]=useState(JSON.parse(JSON.stringify(IW)));
const[alts,setAlts]=useState([...ALTS]);
const[editingTpl,setEditingTpl]=useState(null);const[preEditWk,setPreEditWk]=useState(null);
const[rq,setRq]=useState(loadRq);
const[gs,setGs]=useState(loadGs);
const[tpls,setTpls]=useState(loadTpls);
const[inf,setInf]=useState(loadInf);
const pr=new URLSearchParams(window.location.search);
const gid=pr.get("g");
const[gi,setGi]=useState(null);
const origin=DEF_ORIGIN;

useEffect(()=>{try{localStorage.setItem(TPL_KEY,JSON.stringify(tpls))}catch(e){}},[tpls]);
useEffect(()=>{try{localStorage.setItem(GS_KEY,JSON.stringify(gs))}catch(e){}},[gs]);
useEffect(()=>{try{localStorage.setItem(INF_KEY,JSON.stringify(inf))}catch(e){}},[inf]);
useEffect(()=>{try{localStorage.setItem(RQ_KEY,JSON.stringify(rq))}catch(e){}},[rq]);

useEffect(()=>{
if(!gid)return;
try{const s=localStorage.getItem("ut_"+gid);if(s){const d=JSON.parse(s);if(d.wk)setWk(d.wk);setGi({name:d.name,ci:d.ci,co:d.co});return;}}catch(e){}
const d=pr.get("d");if(d){try{const dc=JSON.parse(fromB64(d));setGi({name:dc.name,ci:dc.ci,co:dc.co});
localStorage.setItem("ut_"+gid,JSON.stringify({name:dc.name,ci:dc.ci,co:dc.co,wk}));}catch(e){}}
},[]);

useEffect(()=>{if(gid&&gi)try{localStorage.setItem("ut_"+gid,JSON.stringify({...gi,wk}))}catch(e){}},[wk]);

const tw=gi&&gi.ci&&gi.co?(function(){const n=Math.round((new Date(gi.co)-new Date(gi.ci))/864e5);return wk.slice(0,Math.max(1,n));}()):wk;

return(
<div style={{minHeight:"100vh",background:C.bg}}>
<Header tab={tab} setTab={setTab} isO={isO} setIsO={setIsO} gi={gi}/>
{tab==="week"&&<WkTab wk={editingTpl?wk:tw} setWk={setWk} gi={editingTpl?null:gi} origin={origin} confirmed={rq.filter(r=>r.st==="confirmed")} editingTpl={editingTpl} isOwner={isO}
onSaveTpl={()=>{if(editingTpl){setTpls(tpls.map(t=>t.id===editingTpl.id?{...t,wk:JSON.parse(JSON.stringify(wk))}:t));setEditingTpl(null);if(preEditWk){setWk(preEditWk);setPreEditWk(null);}}}}
onCancelTpl={()=>{setEditingTpl(null);if(preEditWk){setWk(preEditWk);setPreEditWk(null);}}}/>}
{tab==="crawls"&&<CrTab origin={origin}/>}
{tab==="essentials"&&<EsTab inf={inf} setInf={setInf} isO={isO}/>}
{tab==="bookings"&&<BkTab rq={rq} setRq={setRq} isO={isO}/>}
{tab==="chat"&&<ChTab/>}
{tab==="owner"&&isO&&<OwTab gs={gs} setGs={setGs} tpls={tpls} setTpls={setTpls} alts={alts} setAlts={setAlts} onEditTpl={(t)=>{setPreEditWk(JSON.parse(JSON.stringify(wk)));setWk(JSON.parse(JSON.stringify(t.wk)));setEditingTpl({id:t.id,name:t.name});setTab("week");}}/>}
<div style={{textAlign:"center",padding:"24px 20px",fontSize:11,color:C.mtL}}>Powered by <span style={{color:C.cr,fontWeight:600}}>Arrivo</span></div>
</div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
