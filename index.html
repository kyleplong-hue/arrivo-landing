<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arrivo — Concierge Platform MVP</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   ARRIVO CONCIERGE PLATFORM — MVP
   Two products: Hotel Concierge + Cruise Planner
═══════════════════════════════════════════ */
:root {
  /* Shared neutrals */
  --ink: #0F0D0A;
  --ink-soft: #1E1B17;
  --ash: #8A8279;
  --line: rgba(255,255,255,0.08);

  /* Hotel theme (Aman-inspired — bone, sand, obsidian) */
  --h-bg: #F5F1EB;
  --h-card: #FFFFFF;
  --h-text: #1A1714;
  --h-muted: #7A7168;
  --h-gold: #8B6E3C;
  --h-gold-light: #C8A96E;
  --h-accent: #2C2420;
  --h-border: rgba(139,110,60,0.18);
  --h-green: #2E5E3E;

  /* Cruise theme (nautical — deep navy, aqua, white) */
  --c-bg: #0B1828;
  --c-card: #122236;
  --c-text: #E8F4FF;
  --c-muted: #6B8FAF;
  --c-teal: #00B4D8;
  --c-teal-light: #90E0EF;
  --c-accent: #CAF0F8;
  --c-border: rgba(0,180,216,0.2);
  --c-green: #06D6A0;

  /* Current theme vars (switched by JS) */
  --bg: var(--h-bg);
  --card: var(--h-card);
  --text: var(--h-text);
  --muted: var(--h-muted);
  --brand: var(--h-gold);
  --brand-light: var(--h-gold-light);
  --accent: var(--h-accent);
  --border: var(--h-border);
  --confirm: var(--h-green);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; font-weight: 300; background: var(--bg); color: var(--text); min-height: 100vh; transition: background .4s, color .4s; }

/* ── PRODUCT SWITCHER ── */
.product-switcher {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 10px 20px; gap: 6px;
  background: rgba(15,13,10,0.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.ps-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-right: 6px; }
.ps-btn {
  background: transparent; border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.5); font-family: 'DM Sans', sans-serif;
  font-size: 11px; font-weight: 500; padding: 6px 16px; border-radius: 20px;
  cursor: pointer; transition: all .2s; letter-spacing: 0.3px;
}
.ps-btn.active { border-color: var(--brand-active,#C8A96E); color: var(--brand-active,#C8A96E); background: rgba(200,169,110,0.1); }
.ps-btn.hotel.active { border-color: #C8A96E; color: #C8A96E; background: rgba(200,169,110,0.1); }
.ps-btn.cruise.active { border-color: #00B4D8; color: #00B4D8; background: rgba(0,180,216,0.1); }
.ps-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.15); margin: 0 4px; }

/* ── LAYOUT ── */
.app { display: grid; grid-template-columns: 320px 1fr; min-height: 100vh; padding-top: 44px; }
@media(max-width: 768px) { .app { grid-template-columns: 1fr; } }

/* ── LEFT PANEL — Guest itinerary builder ── */
.guest-panel {
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  background: var(--card);
  position: sticky; top: 44px; height: calc(100vh - 44px);
  overflow-y: auto;
}
.panel-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.brand-lockup { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.brand-logo {
  width: 34px; height: 34px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.hotel-mode .brand-logo { background: #1A1714; color: #C8A96E; }
.cruise-mode .brand-logo { background: #00B4D8; color: #fff; }
.brand-name { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--text); }
.brand-sub { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

.guest-info-bar {
  background: var(--bg); border-radius: 8px; padding: 10px 12px;
  display: flex; align-items: center; gap: 10px;
}
.guest-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 500; flex-shrink: 0;
}
.hotel-mode .guest-avatar { background: rgba(139,110,60,0.15); color: var(--h-gold); }
.cruise-mode .guest-avatar { background: rgba(0,180,216,0.15); color: var(--c-teal); }
.guest-name { font-size: 13px; font-weight: 500; color: var(--text); }
.guest-detail { font-size: 10px; color: var(--muted); }

/* Day tabs */
.day-tabs { display: flex; gap: 5px; padding: 12px 20px 0; overflow-x: auto; flex-shrink: 0; }
.day-tab {
  flex-shrink: 0; background: transparent; border: 1px solid var(--border);
  color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 11px;
  padding: 5px 12px; border-radius: 14px; cursor: pointer; transition: all .18s; white-space: nowrap;
}
.day-tab:hover { color: var(--brand); border-color: var(--brand); }
.day-tab.active { background: var(--brand); border-color: var(--brand); color: #fff; font-weight: 500; }
.hotel-mode .day-tab.active { background: var(--h-gold); border-color: var(--h-gold); }
.cruise-mode .day-tab.active { background: var(--c-teal); border-color: var(--c-teal); color: var(--c-bg); }

/* Itinerary stops */
.itinerary-body { padding: 14px 20px; flex: 1; }
.itin-day-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--brand); margin-bottom: 12px; padding-top: 4px; }
.hotel-mode .itin-day-label { color: var(--h-gold); }
.cruise-mode .itin-day-label { color: var(--c-teal); }

.stop-row {
  display: flex; gap: 10px; margin-bottom: 0; position: relative;
}
.stop-row:not(:last-child)::after {
  content: ''; position: absolute; left: 15px; top: 32px; bottom: -16px;
  width: 1px; background: var(--border);
}
.stop-marker {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; z-index: 1;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; border: 1px solid var(--border);
  background: var(--card); color: var(--brand);
}
.stop-marker.filled { background: var(--brand); color: #fff; border-color: var(--brand); }
.hotel-mode .stop-marker.filled { background: var(--h-gold); border-color: var(--h-gold); }
.cruise-mode .stop-marker.filled { background: var(--c-teal); border-color: var(--c-teal); color: var(--c-bg); }

.stop-card {
  flex: 1; border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 12px; margin-bottom: 16px; background: var(--card);
  position: relative; transition: border-color .18s;
}
.stop-card:hover { border-color: var(--brand); }
.hotel-mode .stop-card:hover { border-color: rgba(139,110,60,0.4); }
.cruise-mode .stop-card:hover { border-color: rgba(0,180,216,0.4); }
.stop-time { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--brand); margin-bottom: 2px; }
.hotel-mode .stop-time { color: var(--h-gold); }
.cruise-mode .stop-time { color: var(--c-teal); }
.stop-title { font-family: 'Playfair Display', serif; font-size: 14px; color: var(--text); margin-bottom: 2px; line-height: 1.3; }
.stop-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }
.stop-price { font-size: 11px; color: var(--brand); font-weight: 500; margin-top: 4px; }
.hotel-mode .stop-price { color: var(--h-gold); }
.cruise-mode .stop-price { color: var(--c-teal); }
.stop-actions { display: flex; gap: 5px; margin-top: 7px; flex-wrap: wrap; }
.stop-btn {
  font-size: 10px; padding: 3px 9px; border-radius: 6px; cursor: pointer;
  border: 1px solid var(--border); color: var(--muted); background: transparent;
  font-family: 'DM Sans', sans-serif; transition: all .18s;
}
.stop-btn:hover { border-color: var(--brand); color: var(--brand); }
.stop-btn.danger:hover { border-color: #E57373; color: #E57373; }
.stop-btn.confirmed { border-color: var(--confirm); color: var(--confirm); }
.capacity-badge {
  position: absolute; top: 8px; right: 8px;
  font-size: 9px; padding: 2px 7px; border-radius: 8px;
  font-weight: 500; letter-spacing: 0.3px;
}
.cap-ok { background: rgba(46,94,62,0.15); color: #2E5E3E; }
.cap-low { background: rgba(217,119,6,0.12); color: #B45309; }
.cap-full { background: rgba(220,38,38,0.12); color: #DC2626; }

/* Submit bar */
.submit-bar {
  padding: 14px 20px; border-top: 1px solid var(--border);
  flex-shrink: 0; background: var(--card);
}
.cost-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
.cost-label { font-size: 11px; color: var(--muted); }
.cost-total { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--text); }
.btn-submit {
  width: 100%; padding: 13px; border: none; border-radius: 10px;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all .2s; letter-spacing: 0.3px;
}
.hotel-mode .btn-submit { background: var(--h-gold); color: #fff; }
.hotel-mode .btn-submit:hover { background: #7A5E2C; }
.cruise-mode .btn-submit { background: var(--c-teal); color: var(--c-bg); }
.cruise-mode .btn-submit:hover { background: #00A0C0; }

/* ── RIGHT PANEL — Activity catalog + Staff view ── */
.main-panel { display: flex; flex-direction: column; overflow: hidden; }

/* View tabs */
.view-tabs {
  display: flex; gap: 0; border-bottom: 1px solid var(--border);
  padding: 0 24px; background: var(--card); flex-shrink: 0;
}
.view-tab {
  background: transparent; border: none; border-bottom: 2px solid transparent;
  color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 12px;
  font-weight: 500; padding: 14px 16px; cursor: pointer; transition: all .18s;
  margin-bottom: -1px;
}
.view-tab.active { color: var(--brand); border-bottom-color: var(--brand); }
.hotel-mode .view-tab.active { color: var(--h-gold); border-bottom-color: var(--h-gold); }
.cruise-mode .view-tab.active { color: var(--c-teal); border-bottom-color: var(--c-teal); }

.panel-content { flex: 1; overflow-y: auto; }

/* ── CATALOG VIEW ── */
.catalog-wrap { padding: 20px 24px; max-width: 900px; }
.catalog-hero { margin-bottom: 20px; }
.catalog-eyebrow { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--brand); margin-bottom: 6px; }
.hotel-mode .catalog-eyebrow { color: var(--h-gold); }
.cruise-mode .catalog-eyebrow { color: var(--c-teal); }
.catalog-title { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--text); margin-bottom: 4px; }
.catalog-sub { font-size: 13px; color: var(--muted); font-weight: 300; }
.cat-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
.cat-filter {
  font-size: 11px; padding: 5px 13px; border-radius: 16px; cursor: pointer;
  border: 1px solid var(--border); color: var(--muted); background: transparent;
  font-family: 'DM Sans', sans-serif; transition: all .18s;
}
.cat-filter.on { font-weight: 500; }
.hotel-mode .cat-filter.on { border-color: var(--h-gold); color: var(--h-gold); background: rgba(139,110,60,0.08); }
.cruise-mode .cat-filter.on { border-color: var(--c-teal); color: var(--c-teal); background: rgba(0,180,216,0.08); }

.activity-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }
.activity-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  overflow: hidden; cursor: pointer; transition: all .2s; position: relative;
}
.activity-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); border-color: var(--brand); }
.hotel-mode .activity-card:hover { border-color: rgba(139,110,60,0.35); }
.cruise-mode .activity-card:hover { border-color: rgba(0,180,216,0.35); }
.activity-card.in-plan { border-color: var(--brand); }
.hotel-mode .activity-card.in-plan { border-color: var(--h-gold); }
.cruise-mode .activity-card.in-plan { border-color: var(--c-teal); }
.act-img {
  width: 100%; height: 140px; object-fit: cover; display: block;
  background: var(--bg);
}
.act-img-placeholder {
  width: 100%; height: 140px; display: flex; align-items: center; justify-content: center;
  font-size: 40px;
}
.hotel-mode .act-img-placeholder { background: #F0EAE0; }
.cruise-mode .act-img-placeholder { background: #0D1F35; }
.act-body { padding: 12px 14px 14px; }
.act-category { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--brand); margin-bottom: 4px; }
.hotel-mode .act-category { color: var(--h-gold); }
.cruise-mode .act-category { color: var(--c-teal); }
.act-title { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
.act-desc { font-size: 11px; color: var(--muted); line-height: 1.4; margin-bottom: 8px; }
.act-meta { display: flex; justify-content: space-between; align-items: center; }
.act-duration { font-size: 10px; color: var(--muted); }
.act-price { font-size: 14px; font-weight: 500; color: var(--text); }
.act-badge {
  position: absolute; top: 8px; right: 8px;
  font-size: 9px; padding: 3px 8px; border-radius: 8px; font-weight: 500;
}
.badge-hotel { background: rgba(139,110,60,0.9); color: #fff; }
.badge-local { background: rgba(44,36,32,0.8); color: #C8A96E; }
.badge-cruise { background: rgba(0,180,216,0.9); color: #fff; }
.badge-shore { background: rgba(6,214,160,0.9); color: #0B1828; }
.act-footer { padding: 0 14px 12px; display: flex; gap: 6px; }
.btn-add {
  flex: 1; padding: 8px; border: none; border-radius: 7px;
  font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
  cursor: pointer; transition: all .18s; text-align: center;
}
.hotel-mode .btn-add { background: var(--h-gold); color: #fff; }
.hotel-mode .btn-add:hover { background: #7A5E2C; }
.cruise-mode .btn-add { background: var(--c-teal); color: var(--c-bg); }
.cruise-mode .btn-add:hover { background: #00A0C0; }
.btn-add.added { background: rgba(46,94,62,0.15) !important; color: var(--confirm) !important; cursor: default; }
.btn-add-time {
  padding: 8px 10px; border: 1px solid var(--border); border-radius: 7px;
  font-size: 11px; color: var(--muted); background: transparent; cursor: pointer;
}
.cap-indicator { padding: 0 14px 10px; }
.cap-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.cap-bar { height: 100%; border-radius: 2px; transition: width .3s; }
.cap-ok-bar { background: var(--confirm); }
.cap-low-bar { background: #D97706; }
.cap-full-bar { background: #DC2626; }
.cap-text { font-size: 9px; color: var(--muted); margin-top: 3px; }

/* ── STAFF DASHBOARD ── */
.staff-wrap { padding: 20px 24px; }
.staff-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.staff-title { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--text); }
.staff-date { font-size: 12px; color: var(--muted); }
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
.stat-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 16px;
}
.stat-val { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--text); line-height: 1; margin-bottom: 4px; }
.stat-label { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; }
.stat-delta { font-size: 10px; color: var(--confirm); margin-top: 2px; }

.bookings-table { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.table-header {
  display: grid; padding: 10px 16px;
  font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted);
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.booking-row {
  display: grid; padding: 12px 16px;
  border-bottom: 1px solid var(--border); align-items: center;
  transition: background .15s; cursor: pointer;
}
.booking-row:hover { background: var(--bg); }
.booking-row:last-child { border-bottom: none; }
.guest-cell { display: flex; align-items: center; gap: 8px; }
.mini-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 500;
}
.hotel-mode .mini-avatar { background: rgba(139,110,60,0.12); color: var(--h-gold); }
.cruise-mode .mini-avatar { background: rgba(0,180,216,0.12); color: var(--c-teal); }
.booking-name { font-size: 13px; font-weight: 500; color: var(--text); }
.booking-ref { font-size: 10px; color: var(--muted); }
.status-pill {
  font-size: 9px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase;
  padding: 3px 10px; border-radius: 10px;
}
.s-pending { background: rgba(217,119,6,0.12); color: #B45309; }
.s-confirmed { background: rgba(46,94,62,0.12); color: #2E5E3E; }
.s-cancelled { background: rgba(220,38,38,0.1); color: #DC2626; }
.confirm-btn {
  font-size: 10px; padding: 4px 12px; border-radius: 6px;
  border: 1px solid var(--confirm); color: var(--confirm);
  background: transparent; cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: all .18s;
}
.confirm-btn:hover { background: var(--confirm); color: #fff; }
.confirm-btn.done { background: var(--confirm); color: #fff; cursor: default; }
.table-5col { grid-template-columns: 2fr 2fr 1fr 1fr 100px; }
.table-6col { grid-template-columns: 2fr 2fr 1fr 1fr 1fr 100px; }

/* Inventory view (cruise) */
.inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-top: 20px; }
.inv-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px;
}
.inv-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
.inv-port { font-size: 10px; color: var(--muted); margin-bottom: 8px; }
.inv-bar-wrap { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
.inv-bar { height: 100%; border-radius: 3px; }
.inv-numbers { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); }
.inv-booked { color: var(--text); font-weight: 500; }

/* ── MODAL — Review & Confirm ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  z-index: 300; display: none; align-items: center; justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  width: 100%; max-width: 500px; overflow: hidden;
}
.modal-header { padding: 20px 22px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
.modal-title { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--text); }
.modal-close { background: transparent; border: none; color: var(--muted); font-size: 18px; cursor: pointer; }
.modal-body { padding: 20px 22px; }
.confirm-stop { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.confirm-stop:last-of-type { border-bottom: none; }
.confirm-stop-name { font-size: 13px; color: var(--text); }
.confirm-stop-time { font-size: 11px; color: var(--muted); }
.confirm-stop-price { font-size: 13px; font-weight: 500; color: var(--brand); }
.hotel-mode .confirm-stop-price { color: var(--h-gold); }
.cruise-mode .confirm-stop-price { color: var(--c-teal); }
.confirm-total { display: flex; justify-content: space-between; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.confirm-total-label { font-size: 12px; color: var(--muted); font-weight: 500; }
.confirm-total-val { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text); }
.modal-footer { padding: 16px 22px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
.btn-confirm {
  flex: 1; padding: 11px; border: none; border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer;
}
.hotel-mode .btn-confirm { background: var(--h-gold); color: #fff; }
.cruise-mode .btn-confirm { background: var(--c-teal); color: var(--c-bg); }
.btn-cancel-modal {
  padding: 11px 18px; border: 1px solid var(--border); border-radius: 8px;
  background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif;
  font-size: 13px; cursor: pointer;
}
.success-state { text-align: center; padding: 24px; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);

}

/* Port day indicator (cruise) */
.port-indicator {

let mode = 'hotel';

let activeDay = 0;
let activeView = 'catalog';
let activeCatFilter = 'All';

// ═══════════════ MODE SWITCH ═══════════════
function setMode(m) {
  mode = m;
  data = m === 'hotel' ? HOTEL_DATA : CRUISE_DATA;
  plan = {};
  activeDay = 0;
  activeCatFilter = 'All';
  document.body.className = m === 'hotel' ? 'hotel-mode' : 'cruise-mode';

  document.getElementById('brandName').textContent = data.brand;

// ═══════════════ DAY TABS ═══════════════
function renderDayTabs() {
  const tabs = document.getElementById('dayTabs');
  const days = data.days || data.ports.map(p => p.name.split('(')[0].trim());
  tabs.innerHTML = days.map((d, i) =>
    `<button class="day-tab${i === activeDay ? ' active' : ''}" onclick="selectDay(${i})">${d}</button>`
  ).join('');
}
function selectDay(i) {
  activeDay = i;
  renderDayTabs();
  renderItinerary();
  if (mode === 'cruise') renderContent(); // refresh catalog to show port-filtered items
}

// ═══════════════ ITINERARY ═══════════════
function renderItinerary() {
  const body = document.getElementById('itineraryBody');
  const dayPlan = plan[activeDay] || [];
  if (dayPlan.length === 0) {
    const portInfo = data.ports ? data.ports[activeDay] : null;
    body.innerHTML = `
      ${portInfo ? `<div class="port-indicator"><div class="port-dot"></div><div class="port-name">${portInfo.name}</div><div class="port-time">In: ${portInfo.arrival} · Out: ${portInfo.departure}</div></div>` : ''}
      <div style="text-align:center;padding:30px 16px;color:var(--muted)">
        <div style="font-size:28px;margin-bottom:8px">✦</div>
        <div style="font-family:'Playfair Display',serif;font-size:14px;margin-bottom:5px;color:var(--text)">Your day is open</div>
        <div style="font-size:11px;line-height:1.5">Browse experiences and tap "Add" to build your perfect day.</div>
      </div>`;
    updateCostBar();
    return;
  }

  const portInfo = data.ports ? data.ports[activeDay] : null;
  let html = portInfo ? `<div class="port-indicator"><div class="port-dot"></div><div class="port-name">${portInfo.name}</div><div class="port-time">In: ${portInfo.arrival} · Out: ${portInfo.departure}</div></div>` : '';
  const dayLabel = data.days ? data.days[activeDay] : (data.ports[activeDay].date);
  html += `<div class="itin-day-label">${dayLabel}</div>`;

  dayPlan.forEach((item, idx) => {
    const act = [...HOTEL_DATA.activities, ...CRUISE_DATA.activities].find(a => a.id === item.id);
    if (!act) return;
    const isLast = idx === dayPlan.length - 1;
    const capPct = act.booked / act.maxCap;
    const capCls = capPct >= 1 ? 'cap-full' : capPct >= 0.8 ? 'cap-low' : 'cap-ok';
    const capLabel = capPct >= 1 ? 'Full' : `${act.maxCap - act.booked} spots left`;
    html += `
      <div class="stop-row">
        <div class="stop-marker filled">${idx + 1}</div>
        <div class="stop-card">
          <span class="capacity-badge ${capCls}">${capLabel}</span>
          <div class="stop-time">${item.time}</div>
          <div class="stop-title">${act.title}</div>
          <div class="stop-desc">${act.duration} · ${act.location || act.port || ''}</div>
          <div class="stop-price">${data.currency}${act.price.toLocaleString()} pp</div>
          <div class="stop-actions">
            <a class="stop-btn" href="https://maps.google.com/?q=${encodeURIComponent(act.mapsQ)}" target="_blank">Maps ↗</a>

            <button class="stop-btn danger" onclick="removeFromPlan(${activeDay},${idx})">Remove</button>
          </div>
        </div>
      </div>`;
  });
  body.innerHTML = html;
  updateCostBar();
}

function updateCostBar() {
  let total = 0;
  Object.values(plan).forEach(dayItems => dayItems.forEach(item => {
    const act = [...HOTEL_DATA.activities, ...CRUISE_DATA.activities].find(a => a.id === item.id);
    if (act) total += act.price;
  }));
  document.getElementById('costTotal').textContent = `${data.currency}${total.toLocaleString()}`;
}

function removeFromPlan(dayIdx, stopIdx) {
  plan[dayIdx].splice(stopIdx, 1);
  if (plan[dayIdx].length === 0) delete plan[dayIdx];
  renderItinerary();
  renderContent();
}

function changeTime(dayIdx, stopIdx) {
  const times = ['7:00 AM','8:00 AM','9:00 AM','10:00 AM','11:00 AM','12:00 PM','1:00 PM','2:00 PM','3:00 PM','4:00 PM','5:00 PM','6:00 PM'];
  const current = plan[dayIdx][stopIdx].time;
  const idx = times.indexOf(current);
  plan[dayIdx][stopIdx].time = times[(idx + 1) % times.length];
  renderItinerary();
}

function addToPlan(actId) {
  const act = data.activities.find(a => a.id === actId);
  if (!act) return;
  if (!plan[activeDay]) plan[activeDay] = [];
  const alreadyIn = plan[activeDay].find(i => i.id === actId);
  if (alreadyIn) { showToast('Already in your day plan'); return; }
  const defaultTimes = ['9:00 AM','11:00 AM','2:00 PM','4:00 PM'];
  const t = defaultTimes[plan[activeDay].length] || '10:00 AM';
  plan[activeDay].push({ id: actId, time: t });
  renderItinerary();
  renderContent();
  showToast(`${act.title} added to ${data.days ? data.days[activeDay] : data.ports[activeDay].name}`);
}

// ═══════════════ CATALOG ═══════════════
function renderContent() {
  if (activeView === 'catalog') renderCatalog();
  else renderStaff();
}

function renderCatalog() {
  const acts = data.activities.filter(a =>
    activeCatFilter === 'All' || (a.filter && a.filter.includes(activeCatFilter))
  );
  const portFilter = mode === 'cruise' ? data.ports[activeDay].name : null;
  const filtered = portFilter ? acts.filter(a => a.port === portFilter) : acts;

  const dayPlan = plan[activeDay] || [];
  const inPlan = new Set(dayPlan.map(i => i.id));

  let html = `<div class="catalog-wrap">
    <div class="catalog-hero">
      <div class="catalog-eyebrow">${data.catalogEyebrow}${portFilter ? ' — ' + portFilter : ''}</div>
      <div class="catalog-title">${data.catalogTitle}</div>
      <div class="catalog-sub">${data.catalogSub}</div>
    </div>
    <div class="cat-filters">`;
  data.filters.forEach(f => {
    html += `<button class="cat-filter${activeCatFilter === f ? ' on' : ''}" onclick="setCatFilter('${f}')">${f}</button>`;
  });
  html += `</div><div class="activity-grid">`;

  filtered.forEach(act => {
    const added = inPlan.has(act.id);
    const capPct = act.booked / act.maxCap;
    const capCls = capPct >= 1 ? 'cap-full-bar' : capPct >= 0.8 ? 'cap-low-bar' : 'cap-ok-bar';
    const capPx = Math.round(capPct * 100);
    const spotsLeft = act.maxCap - act.booked;
    const capTxt = capPct >= 1 ? 'Fully booked' : `${spotsLeft} of ${act.maxCap} spots available`;
    const badgeCls = act.badge === 'hotel' ? 'badge-hotel' : act.badge === 'local' ? 'badge-local' : act.badge === 'cruise' ? 'badge-cruise' : 'badge-shore';

    html += `
      <div class="activity-card${added ? ' in-plan' : ''}">
        <div class="act-img-placeholder">${act.emoji}</div>
        <span class="act-badge ${badgeCls}">${act.badgeLabel}</span>
        <div class="act-body">
          <div class="act-category">${act.category}</div>
          <div class="act-title">${act.title}</div>
          <div class="act-desc">${act.desc}</div>
          <div class="act-meta">
            <span class="act-duration">⏱ ${act.duration}</span>
            <span class="act-price">${data.currency}${act.price.toLocaleString()}</span>
          </div>
        </div>
        <div class="cap-indicator">
          <div class="cap-bar-wrap"><div class="cap-bar ${capCls}" style="width:${capPx}%"></div></div>
          <div class="cap-text">${capTxt}</div>
        </div>
        <div class="act-footer">
          <button class="btn-add${added ? ' added' : ''}" onclick="${added ? '' : `addToPlan('${act.id}')`}">
            ${added ? '✓ In your plan' : '+ Add to day'}
          </button>
          ${!added ? `<button class="btn-add-time" onclick="addToPlan('${act.id}')">🗺</button>` : ''}
        </div>
      </div>`;
  });

  html += `</div></div>`;
  document.getElementById('panelContent').innerHTML = html;
}

function setCatFilter(f) {
  activeCatFilter = f;
  renderCatalog();
}

function confirmStaff(i, btnId) {
  const btn = document.getElementById(btnId);
  if (btn) { btn.className = 'confirm-btn done'; btn.textContent = '✓ Confirmed'; }
  showToast('Booking confirmed & guest notified');
}

// ═══════════════ VIEW TABS ═══════════════
function showView(v) {
  activeView = v;
  document.querySelectorAll('.view-tab').forEach((t, i) => {
    t.classList.toggle('active', (v === 'catalog' && i === 0) || (v === 'staff' && i === 1));
  });
  renderContent();
}

// ═══════════════ CONFIRM MODAL ═══════════════
function openConfirmModal() {
  const allItems = Object.entries(plan).flatMap(([dayIdx, items]) =>
    items.map(item => ({ ...item, dayIdx: parseInt(dayIdx) }))
  );
  if (allItems.length === 0) { showToast('Add at least one experience first'); return; }

  let total = 0;
  let bodyHtml = '';
  allItems.forEach(item => {
    const act = [...HOTEL_DATA.activities, ...CRUISE_DATA.activities].find(a => a.id === item.id);
    if (!act) return;
    total += act.price;
    const dayLabel = data.days ? data.days[item.dayIdx] : data.ports[item.dayIdx]?.name || '';
    bodyHtml += `
      <div class="confirm-stop">
        <div>
          <div class="confirm-stop-name">${act.title}</div>
          <div class="confirm-stop-time">${dayLabel} · ${item.time}</div>
        </div>
        <div class="confirm-stop-price">${data.currency}${act.price.toLocaleString()}</div>
      </div>`;
  });
  bodyHtml += `
    <div class="confirm-total">
      <div class="confirm-total-label">Estimated total</div>
      <div class="confirm-total-val">${data.currency}${total.toLocaleString()}</div>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-top:12px;line-height:1.5">
      ${mode === 'hotel'
        ? 'Your concierge will review and confirm availability within 30 minutes. You\'ll receive a message at the front desk.'
        : 'Your shore excursions coordinator will confirm availability and add your tickets to your stateroom folio.'}
    </div>`;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalTitle').textContent = 'Review your ' + (mode === 'hotel' ? 'itinerary' : 'excursions');
  document.getElementById('confirmModal').classList.add('open');
}

function confirmBooking() {
  const ref = mode === 'hotel' ? 'AV-0322-' + Math.floor(Math.random()*900+100) : 'SS-703-' + Math.floor(Math.random()*900+100);
  document.getElementById('modalInner').innerHTML = `
    <div class="success-state">
      <div class="success-icon">${mode === 'hotel' ? '✉️' : '⚓'}</div>
      <div class="success-title">${mode === 'hotel' ? 'Sent to your concierge' : 'Excursions requested'}</div>
      <div class="success-msg">${mode === 'hotel'
        ? 'Your itinerary has been sent to the front desk. Your concierge will confirm each experience and leave a note in your suite within the hour.'
        : 'Your shore excursion requests have been sent to the excursions desk. Tickets will be added to your stateroom folio once confirmed.'}</div>
      <div class="success-ref">Ref: ${ref}</div>
    </div>`;
  setTimeout(() => {
    document.querySelector('.modal-footer') && (document.querySelector('.modal-footer').innerHTML = `<button class="btn-confirm" onclick="closeModalDirect()">Done</button>`);
  }, 50);
}

function closeModal(e) { if (e.target === document.getElementById('confirmModal')) closeModalDirect(); }
function closeModalDirect() {
  document.getElementById('confirmModal').classList.remove('open');
  setTimeout(() => {
    document.getElementById('modalInner').innerHTML = `
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Review your itinerary</div>
        <button class="modal-close" onclick="closeModalDirect()">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn-cancel-modal" onclick="closeModalDirect()">Edit</button>
        <button class="btn-confirm" onclick="confirmBooking()">Send to concierge →</button>
      </div>`;
  }, 300);
}

// ═══════════════ TOAST ═══════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

renderDayTabs();
renderItinerary();
renderContent();
</script>
