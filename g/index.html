<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Your Trip — Arrivable</title>
<meta name="robots" content="noindex">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0F0E0B;color:#EDE5DD;display:flex;align-items:center;justify-content:center;min-height:100vh}
.loading{text-align:center}
.spinner{width:32px;height:32px;border:3px solid #2A2520;border-top-color:#B8963E;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
p{font-size:13px;color:#8A8478}
</style>
<script>
// Redirect /g/{link_id} → /montepulciano/?pb={link_id}
const linkId = window.location.pathname.split('/g/')[1]?.replace(/\/$/, '');
if (linkId) {
  window.location.replace('/montepulciano/?pb=' + encodeURIComponent(linkId));
} else {
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelector('.loading').innerHTML = '<p>No trip link found.</p>';
  });
}
</script>
</head>
<body>
<div class="loading"><div class="spinner"></div><p>Loading your trip...</p></div>
</body>
</html>
