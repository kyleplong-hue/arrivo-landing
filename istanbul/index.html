function ChTab(){
const[ms,setMs]=useState([{r:"a",t:"Merhaba! \uD83C\uDF1F I'm your Culinary Backstreets Istanbul concierge. I know every backstreet, every usta, every lokanta. Ask me anything \u2014 where to eat tonight, how to avoid tourist traps, which ferry to take, or what to order when you can't read the menu."}]);
const[inp,setInp]=useState("");const[ld,setLd]=useState(false);const er=useRef(null);
useEffect(()=>{er.current&&er.current.scrollIntoView({behavior:"smooth"});},[ms]);
const send=async()=>{
if(!inp.trim()||ld)return;const u=inp.trim();setInp("");
setMs(p=>[...p,{r:"u",t:u}]);setLd(true);
try{
const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,system:`You are the Culinary Backstreets Istanbul concierge \u2014 the voice of a decade of deep food journalism in this city. You speak like a warm, knowledgeable local friend who has eaten at every backstreet joint and knows every usta by name. Give specific restaurants with neighborhoods. Use Turkish food terms naturally (explain briefly). Your tone: literary but accessible, passionate but never pretentious.

KEY RESTAURANTS YOU LOVE:
- Çiya Sofrası (Kadıköy) \u2014 "very likely the best restaurant in Istanbul." Rotating Anatolian menu.
- Karaköy Lokantası \u2014 lokanta by day, meyhane by night. Reliably excellent.
- Aynen Dürüm \u2014 microscopic kebab shack at Grand Bazaar edge. Best lamb dürüm.
- Karaköy Güllüoğlu \u2014 baklava institution since 1800s.
- Mahir Lokantası (Osmanbey) \u2014 wood-fired oven, Diyarbakır roots.
- Mezme (Kurtuluş) \u2014 Armenian-Hatay meze by chef Sasun. Reopened 2024.
- Kaya Döner (Bomonti) \u2014 excellent new döner, opened 2024.
- Kavurmacı Goze (Sirkeci) \u2014 one item: kavurma (braised beef). Hidden gem.
- Bayramoğlu \u2014 possibly best döner in Turkey. Oak charcoal, tandır bread.
- Boris'in Yeri (Ayaspaşa) \u2014 kaymak & egg breakfast. White Russian heritage.
- Ozzie's Kokoreç (Asmalımescit) \u2014 legendary grilled lamb intestines.
- Cuma \u2014 contemporary Turkish on a charming street.
- Sofyalı 9 (Beyoğlu) \u2014 classic meyhane. Meze + rakı.
- Namlı Gurme (Karaköy) \u2014 deli paradise. Cheeses, breakfast.
- Lezzet-i Şark \u2014 künefe perfection.
- Kanaat Lokantası (Üsküdar) \u2014 Ottoman recipes.

CB FOOD TOURS: Old City Secrets (5hr), Born on the Bosphorus (full day), Bazaar Quarter (6hr), Two Continents Market (full day).

NEIGHBORHOODS: Sultanahmet (monuments+traps), Karaköy (renaissance), Beyoğlu (nightlife), Kadıköy (Asian side markets), Fatih/Balat (deep), Beşiktaş (breakfast street).

Keep responses concise \u2014 like a knowledgeable friend texting. Include specific dish recommendations when possible.`,messages:[...ms.slice(-6).map(m=>({role:m.r==="a"?"assistant":"user",content:m.t})),{role:"user",content:u}]})});
const data=await res.json();
setMs(p=>[...p,{r:"a",t:(data.content&&data.content[0]&&data.content[0].text)||"Hmm, try again!"}]);
}catch(e){setMs(p=>[...p,{r:"a",t:"Connection issue \u2014 try again!"}]);}
setLd(false);};
return(
<div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 110px)",maxWidth:700,margin:"0 auto"}}>

{m.r==="a"&&<div style={{width:30,height:30,borderRadius:8,background:C.terra,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#fff",marginRight:8,flexShrink:0,marginTop:2,fontFamily:"'Playfair Display',serif",letterSpacing:1}}>CB</div>}
<div style={{maxWidth:"75%",padding:"12px 16px",borderRadius:m.r==="u"?"18px 18px 4px 18px":"18px 18px 18px 4px",background:m.r==="u"?C.fg:C.wh,border:m.r==="u"?"none":"1px solid "+C.bd,color:m.r==="u"?"#fff":C.fg,fontSize:14,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{m.t}</div>
</div>))}
{ld&&<div style={{display:"flex",gap:8,marginBottom:12}}>

</div>

</div>
</div>);}
