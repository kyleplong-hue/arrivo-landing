const STORIES={
"Boris'in Yeri":{url:"https://culinarybackstreets.com/cities-category/istanbul/2023/borisin-yeri/",excerpt:"In a city of breakfast legends, Boris'in Yeri stands apart. Tucked into a quiet Ayaspaşa side street, this White Russian–heritage restaurant has been serving kaymak and eggs since the early Republic. The clotted cream arrives in a copper pan, still bubbling, alongside warm bread and a glass of tea. It's the kind of place where regulars have their own tables and the menu hasn't changed in decades — because it doesn't need to."},
"Çiya Sofrası":{url:"https://culinarybackstreets.com/cities-category/istanbul/2024/ciya-sofras/",excerpt:"If Istanbul has a single essential restaurant, it may be Çiya Sofrası. Chef Musa Dağdeviren has spent decades traveling Turkey's most remote villages, collecting recipes that would otherwise vanish. The menu changes daily: one day it's a tart cherry kebab from Gaziantep, the next a wild herb stew from the Black Sea. Every plate tells a story. This isn't fusion or reinvention — it's rescue work, served on a plate."},
"Karaköy Lokantası":{url:"https://culinarybackstreets.com/cities-category/istanbul/2023/karakoy-lokantasi/",excerpt:"By day, Karaköy Lokantası is an esnaf lokantası — steam trays of stewed okra, braised lamb, and pilaf. By night, it transforms into one of the city's best meyhanes. The meze spread is impeccable: atom (spicy tomato paste with walnuts), stuffed mussels, and a smoky eggplant that haunts you for days. The rakı flows. The conversation deepens. This is Turkish dining at its most elemental."},
"Karaköy Güllüoğlu":{url:"https://culinarybackstreets.com/cities-category/istanbul/2023/karakoy-gulluoglu/",excerpt:"The Güllüoğlu family has been making baklava since the 1800s in Gaziantep. Their Karaköy outpost is a pilgrimage site. The pistachio baklava arrives glistening, impossibly thin layers of phyllo shattering at the touch of a fork. The butter is from Urfa, the pistachios from their own groves. There's a reason the queue never ends — this is baklava at its absolute peak."},
"Aynen Dürüm":{url:"https://culinarybackstreets.com/cities-category/istanbul/2024/aynen-durum/",excerpt:"Blink and you'll miss Aynen Dürüm — a microscopic kebab window wedged against the Grand Bazaar's ancient walls. But follow the smoke and you'll find some of the city's finest lamb dürüm. The meat is hand-minced, seasoned simply, and grilled over hardwood charcoal. Wrapped in lavash with a smear of hot pepper paste and a handful of flat-leaf parsley, it's the platonic ideal of a kebab wrap."},
"Mahir Lokantası":{url:"https://culinarybackstreets.com/cities-category/istanbul/2024/mahir-lokantasi/",excerpt:"Mahir Lokantası in Osmanbey is the esnaf lokantası elevated to art. The owners are from Diyarbakır, and it shows: the wood-fired oven turns out impossibly crisp pide, the stews are slow-cooked with southeastern spice blends, and the daily specials rotate through a repertoire that would shame most restaurants with ten times the pretension. Come hungry. Leave converted."},
"Mezme":{url:"https://culinarybackstreets.com/cities-category/istanbul/2024/mezme/",excerpt:"In the quietly diverse neighborhood of Kurtuluş, chef Sasun Çakmak runs Mezme — part meze deli, part meyhane, entirely personal. Drawing on Armenian and Hatay traditions, the meze here is unlike anywhere else in the city. Think muhammara with depth, topik with finesse, and a lahmacun that makes you reconsider everything you thought you knew about the dish. Sasun recently reopened after a brief hiatus, and the city is better for it."},
"Kaya Döner":{url:"https://culinarybackstreets.com/cities-category/istanbul/2024/kaya-doner/",excerpt:"Opened in 2024 by a young couple in Bomonti, Kaya Döner represents the new school of Istanbul döner. Every detail is considered: the meat is stacked by hand each morning, the bread is baked in-house, and the sauces are made from scratch. It's a level of attention that most döner joints would consider unnecessary — but one bite tells you it matters. This is döner as craft."},
"Kavurmacı Goze":{url:"https://culinarybackstreets.com/cities-category/istanbul/2023/kavurmaci-goze/",excerpt:"Beneath a magnificent copper-domed Ottoman bank building in Sirkeci, Kavurmacı Goze serves exactly one thing: kavurma. Braised beef, slow-cooked until it falls apart, served in a copper pan with bread. That's the menu. No appetizers, no dessert, no choices. And it's perfect. The meat comes from specific farms, the technique is generations old, and the result is the kind of simple, devastating deliciousness that makes you question everything else."},
"Ozzie's Kokoreç":{url:"https://culinarybackstreets.com/cities-category/istanbul/2023/ozzies-kokorec/",excerpt:"In a tiny Asmalımescit storefront, Usta Oğuzhan — known to everyone as Ozzie — grills kokoreç with the precision of a surgeon. Seasoned lamb intestines, wound tight on a horizontal spit, charred over glowing coals, then chopped with tomatoes and peppers on a flat griddle. Tucked into half a bread loaf, it's one of Istanbul's most polarizing and most beloved street foods. If you're going to try kokoreç, this is where."},
"Sofyalı 9":{url:"https://culinarybackstreets.com/cities-category/istanbul/2023/sofyali-9/",excerpt:"Down a narrow Beyoğlu passage, Sofyalı 9 is the meyhane distilled to its essence. The meze comes on small plates, the rakı comes in slim glasses, and the night comes slowly. Regulars pack the tiny space, talking over each other, ordering 'a little more of everything.' The atom is legendary, the calamari is crisp, and by the third glass of rakı, you'll understand why the meyhane isn't a restaurant — it's a way of life."},
"Namlı Gurme":{url:"https://culinarybackstreets.com/cities-category/istanbul/2023/namli-gurme/",excerpt:"Namlı Gurme in Karaköy is less a deli and more a declaration of intent. Wheels of aged kaşar, barrels of cured olives, ropes of sucuk, and a breakfast spread that could feed a village. Grab a tray, point at things, and sit at one of the communal tables. The cheeses alone — from Van otlu peynir to Ezine beyaz — are worth the trip. This is how Istanbul starts its morning."},
"Lezzet-i Şark":{url:"https://culinarybackstreets.com/cities-category/istanbul/2023/lezzet-i-sark/",excerpt:"Künefe is Turkey's greatest dessert, and Lezzet-i Şark may be its greatest practitioner. The dish is deceptively simple: shredded kadayıf pastry, a layer of unsalted cheese, baked until golden, then drenched in sugar syrup and showered with pistachios. But the execution here — the crunch, the stretch, the sweetness — borders on the transcendent. Eat it hot. Eat it immediately. Don't share."},

function ChatTab({guestInfo}){const[msgs,setMsgs]=useState([{role:"assistant",content:"Merhaba! 🌟 I'm your Culinary Backstreets Istanbul concierge."+(guestInfo?" Hoş geldiniz, "+guestInfo.name.split(" ")[0]+"!":"")+"\n\nI know every backstreet, every usta, every lokanta. Ask me anything — where to eat tonight, how to avoid tourist traps, which ferry to take, or what to order when you can't read the menu."}]);const[input,setInput]=useState("");const[loading,setLoading]=useState(false);const endRef=useRef(null);
useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs,loading]);
const chips=["Best dinner tonight?","Plan for a rainy day?","Meyhane for beginners?","Where's the best baklava?","Cheap & amazing lunch?","Best kebab in Istanbul?"];
const send=async t=>{if(!t.trim()||loading)return;const um={role:"user",content:t.trim()};setMsgs(p=>[...p,um]);setInput("");setLoading(true);try{const h=[...msgs.filter(m=>m.role!=="system"),um].map(m=>({role:m.role,content:m.content}));const res=await fetch(API_PROXY_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,system:GUIDE,messages:h})});const data=await res.json();const reply=data.content?.map(b=>b.text||"").join("\n")||"Sorry, try again!";setMsgs(p=>[...p,{role:"assistant",content:reply}]);}catch{setMsgs(p=>[...p,{role:"assistant",content:"Connection issue — try again!"}]);}setLoading(false);};
const renderMsg=text=>{const parts=linkP(text);if(typeof parts==="string")return parts;return parts.map((p,i)=>typeof p==="string"?<span key={i}>{p}</span>:<a key={i} href={MB+p.query} target="_blank" rel="noopener" style={{color:T.sky,textDecoration:"underline",textDecorationColor:T.sky+"55",textUnderlineOffset:2}}>{p.place}</a>);};
return<div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 100px)",maxWidth:700,margin:"0 auto"}}><div style={{flex:1,overflowY:"auto",padding:"14px 14px 8px"}}>{msgs.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:10}}>{m.role==="assistant"&&<div style={{width:28,height:28,borderRadius:8,background:T.terra,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#fff",marginRight:6,flexShrink:0,marginTop:2,fontFamily:"'Playfair Display',serif",letterSpacing:1}}>CB</div>}<div style={{maxWidth:"80%",padding:"10px 14px",borderRadius:m.role==="user"?"14px 14px 4px 14px":"14px 14px 14px 4px",background:m.role==="user"?T.fg:T.wh,color:m.role==="user"?"#fff":T.fg,fontSize:13,lineHeight:1.6,whiteSpace:"pre-wrap",border:m.role==="user"?"none":"1px solid "+T.bd}}>{m.role==="assistant"?renderMsg(m.content):m.content}</div></div>)}{loading&&<div style={{display:"flex",gap:6,marginBottom:10}}><div style={{width:28,height:28,borderRadius:8,background:T.terra,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#fff",fontFamily:"'Playfair Display',serif",letterSpacing:1}}>CB</div><div style={{padding:"10px 14px",background:T.wh,borderRadius:"14px 14px 14px 4px",border:"1px solid "+T.bd,color:T.mt,fontSize:13}}><span style={{animation:"pulse 1s ease infinite"}}>●</span><span style={{animation:"pulse 1s ease infinite .2s"}}> ●</span><span style={{animation:"pulse 1s ease infinite .4s"}}> ●</span></div></div>}{msgs.length<=1&&!loading&&<div style={{marginTop:4}}><p style={{fontSize:11,color:T.mt,marginBottom:6}}>Quick questions:</p><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{chips.map((c,i)=><button key={i} onClick={()=>send(c)} style={{background:T.wh,border:"1px solid "+T.terra+"20",color:T.terra,fontSize:11,padding:"6px 10px",borderRadius:16,cursor:"pointer"}}>{c}</button>)}</div></div>}<div ref={endRef}/></div>
<div style={{padding:"8px 14px 14px",borderTop:"1px solid "+T.bd,background:T.bg,display:"flex",gap:6}}><input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send(input)} placeholder="Ask about restaurants, neighborhoods, street food..." style={{flex:1,padding:"10px 14px",background:T.wh,border:"1px solid "+T.bd,borderRadius:20,color:T.fg,fontSize:13,fontFamily:"'Source Sans 3',sans-serif",outline:"none"}}/><button onClick={()=>send(input)} disabled={loading||!input.trim()} style={{padding:"10px 18px",background:input.trim()?T.terra:T.bgS,border:"none",borderRadius:20,color:input.trim()?"#fff":T.mt,fontWeight:600,fontSize:13,cursor:input.trim()?"pointer":"default"}}>Send</button></div>
</div>;}

<div style={{marginBottom:6}}><label style={{fontSize:9,color:T.mt}}>Description</label><input value={altForm.d||""} onChange={e=>setAltForm({...altForm,d:e.target.value})} style={iS}/></div>
<div style={{display:"flex",gap:4}}>
<button onClick={()=>{if(altForm.l){setAlts(p=>[...p,{...altForm,tag:altForm.cat}]);setNewAlt(false);setAltForm({});}}} style={{padding:"7px 14px",background:altForm.l?T.terra:T.bgS,color:altForm.l?"#fff":T.mt,border:"none",borderRadius:7,fontSize:11,fontWeight:600,cursor:"pointer"}}>Save</button>
<button onClick={()=>setNewAlt(false)} style={{padding:"7px 10px",background:T.wh,color:T.mt,border:"1px solid "+T.bd,borderRadius:7,fontSize:11,cursor:"pointer"}}>✕</button>
</div></div>}
<div style={{maxHeight:400,overflowY:"auto"}}>
{filtAlts.map((a,fi)=>{const ri=alts.indexOf(a);const s=TS[a.tag]||TS.lunch;
return<div key={ri} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:T.bgS,borderRadius:8,marginBottom:3,border:"1px solid "+T.bd}}>
<span style={{fontSize:12,width:20,textAlign:"center"}}>{s.i}</span>
<div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.l}</div><div style={{fontSize:10,color:T.mt,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.d}</div></div>
<span style={{fontSize:9,color:s.a,background:s.bg,padding:"2px 6px",borderRadius:8,flexShrink:0}}>{a.cat}</span>
</div>;})}
</div></div>
</div>;}

/* ═══ APP ═══ */
function App(){
const[tab,setTab]=useState("week");
const[isOwner,setIsOwner]=useState(false);
const[week,setWeek]=useState(initWeek);
const[requests,setRequests]=useState([]);
const[guests,setGuests]=useState([]);
const[guestMode,setGuestMode]=useState(false);
const[guestInfo,setGuestInfo]=useState(null);
const[alts,setAlts]=useState([...ALTS]);

useEffect(()=>{const gId=getURLGuest();if(!gId)return;const saved=loadGD(gId);if(saved){setGuestInfo({name:saved.name,checkin:saved.checkin,checkout:saved.checkout});setWeek(saved.week);setGuestMode(true);return;}const decoded=decodeGuestURL();if(decoded){setGuestInfo({name:decoded.name,checkin:decoded.checkin,checkout:decoded.checkout});setWeek(decoded.week);saveGD(gId,decoded);setGuestMode(true);};},[]);

useEffect(()=>{if(!guestMode)return;const gId=getURLGuest();if(!gId)return;saveGD(gId,{...guestInfo,id:gId,week});},[week,guestMode,guestInfo]);

return<div style={{minHeight:"100vh",background:T.bg}}>
<Header tab={tab} setTab={setTab} isOwner={isOwner} setIsOwner={setIsOwner} guestMode={guestMode} guestInfo={guestInfo}/>
{tab==="week"&&<WeekTab week={week} setWeek={setWeek} guestInfo={guestInfo} isOwner={isOwner}/>}
{tab==="trips"&&<TripsTab setWeek={setWeek} setTab={setTab}/>}
{tab==="info"&&<InfoTab/>}
{tab==="requests"&&<RequestsTab requests={requests} setRequests={setRequests} isOwner={isOwner}/>}
{tab==="chat"&&<ChatTab guestInfo={guestInfo}/>}
{tab==="owner"&&isOwner&&<OwnerTab week={week} guests={guests} setGuests={setGuests} alts={alts} setAlts={setAlts}/>}
<div style={{textAlign:"center",padding:"28px 20px 20px"}}>
<div style={{fontSize:11,color:T.mtL,lineHeight:1.8}}>
<span style={{color:T.terra,fontWeight:700}}>DEMO</span> · Built for Culinary Backstreets by <span style={{fontWeight:600,color:T.mt}}>Arrivo</span>
</div></div>
</div>;}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
